name: Docker Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t linkbox:test .
      
      - name: Run container
        run: |
          docker run -d -p 8080:8080 --name linkbox-test linkbox:test
      
      - name: Wait for startup
        run: sleep 10
      
      - name: Check if container is running
        run: |
          docker ps | grep linkbox-test || (docker logs linkbox-test && exit 1)
      
      - name: Test API endpoint
        run: |
          curl -f http://localhost:8080/docs || curl -f http://localhost:8080/
      
      - name: Cleanup
        if: always()
        run: |
          docker stop linkbox-test || true
          docker rm linkbox-test || true
